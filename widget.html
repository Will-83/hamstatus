<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HamStatus Widget</title>
<style>
  :root {
    --bg: #14110d;
    --panel: #1c1712;
    --grid: rgba(255,176,0,0.07);
    --fg: #ffb000;
    --fg-dim: #7a5200;
    --fg-muted: #8a6a2e;
    --off: #4a4a4a;
    --off-dim: #2a2a2a;
  }
  [data-theme="green"] {
    --fg: #39ff88;
    --fg-dim: #0d5c33;
    --fg-muted: #2e8a5a;
    --grid: rgba(57,255,136,0.07);
  }
  [data-theme="light"] {
    --bg: #f4f1ea;
    --panel: #ffffff;
    --grid: rgba(0,0,0,0.04);
    --fg: #1f2937;
    --fg-dim: #9ca3af;
    --fg-muted: #6b7280;
    --off: #d1d5db;
    --off-dim: #e5e7eb;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: transparent;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, monospace;
  }
  .widget {
    width: 100%; height: 100%;
    background: var(--panel);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 8px 8px;
    border: 1px solid var(--fg-dim);
    border-radius: 6px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: var(--fg);
    overflow: hidden;
  }
  .row1 {
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .callsign {
    font-weight: 700; font-size: 0.95rem; letter-spacing: 0.5px;
  }
  .meter { display: flex; gap: 2px; align-items: flex-end; height: 14px; }
  .meter .bar {
    width: 4px; background: var(--off); border-radius: 1px;
  }
  .meter .bar:nth-child(1) { height: 30%; }
  .meter .bar:nth-child(2) { height: 50%; }
  .meter .bar:nth-child(3) { height: 65%; }
  .meter .bar:nth-child(4) { height: 80%; }
  .meter .bar:nth-child(5) { height: 100%; }
  .widget[data-state="on_air"] .meter .bar,
  .widget[data-state="monitoring"] .meter .bar { background: var(--fg); }
  .widget[data-state="on_air"] .meter { animation: pulse 2.2s ease-in-out infinite; }
  .widget[data-state="monitoring"] .meter { opacity: 0.7; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  .freq-row { margin-top: 4px; }
  .freq { font-size: 1.5rem; font-weight: 700; }
  .unit { font-size: 0.7rem; color: var(--fg-muted); margin-left: 4px; }
  .mode-tag {
    font-size: 0.65rem; color: var(--fg-muted); margin-left: 8px;
    border: 1px solid var(--fg-dim); border-radius: 3px; padding: 1px 5px;
  }

  .opmode { font-size: 0.75rem; color: var(--fg-muted); margin-top: 2px; }
  .msg {
    font-size: 0.72rem; color: var(--fg-muted); margin-top: 6px;
    font-style: italic; opacity: 0.9;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.62rem; color: var(--fg-muted); margin-top: 8px;
    border-top: 1px solid var(--fg-dim); padding-top: 5px;
  }
  .footer a { color: var(--fg-muted); text-decoration: none; }
  .status-word { font-weight: 700; }
  .widget[data-state="on_air"] .status-word { color: var(--fg); }
  .widget[data-state="monitoring"] .status-word { color: var(--fg-muted); }
  .widget[data-state="off_air"] .status-word { color: var(--fg-muted); opacity: 0.6; }

  body.size-compact .opmode,
  body.size-compact .msg { display: none; }
  body.size-compact .freq { font-size: 1.3rem; }

  .error-state { color: var(--fg-muted); font-size: 0.75rem; text-align: center; padding: 10px 0; }
</style>
</head>
<body>
  <div class="widget" id="widget" data-state="off_air">
    <div class="row1">
      <span class="callsign" id="callsign">--</span>
      <span class="meter"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></span>
    </div>
    <div class="freq-row" id="freqrow">
      <span class="freq" id="freq">--.---</span><span class="unit" id="unit">MHz</span><span class="mode-tag" id="modetag">--</span><span class="mode-tag" id="bandtag" style="display:none;"></span>
    </div>
    <div class="freq-row" id="tgrow" style="display:none;">
      <span class="freq" id="tgtext">TG ----</span><span class="mode-tag">DMR</span>
    </div>
    <div class="opmode" id="opmode">--</div>
    <div class="msg" id="msg"></div>
    <div class="footer">
      <span class="status-word" id="statusword">OFF AIR</span>
      <span id="updated">--</span>
    </div>
  </div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const theme = params.get('theme') || 'amber';      // amber | green | light
  const size = params.get('size') || 'full';          // full | compact
  const src = params.get('src') || './status.json';   // override to point elsewhere later
  const refreshSec = parseInt(params.get('refresh') || '60', 10);

  if (theme !== 'amber') document.documentElement.setAttribute('data-theme', theme);
  if (size === 'compact') document.body.classList.add('size-compact');

  const el = id => document.getElementById(id);

  function timeAgo(iso) {
    const diffMs = Date.now() - new Date(iso).getTime();
    const mins = Math.round(diffMs / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.round(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.round(hrs / 24) + 'd ago';
  }

  const STATE_LABELS = { on_air: 'ON AIR', monitoring: 'MONITORING', off_air: 'OFF AIR' };

  async function refresh() {
    try {
      const res = await fetch(src + (src.includes('?') ? '&' : '?') + 't=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();

      // Supports both the v1.0 schema (frequency as an object) and the older
      // flat schema (frequency as a plain string), so this keeps working
      // even against a status.json that hasn't been migrated yet.
      const freq = (data.frequency && typeof data.frequency === 'object')
        ? data.frequency
        : { value: data.frequency, unit: 'MHz', band: '' };
      const state = data.state || (data.is_active ? 'on_air' : 'off_air');

      el('callsign').textContent = data.callsign || '--';
      el('modetag').textContent = data.mode || '--';

      // DMR sessions with an active talkgroup show "TG <id> - <name>" instead
      // of the frequency row; everything else shows frequency as usual.
      const tgActive = data.mode === 'DMR' && data.talkgroup;
      el('freqrow').style.display = tgActive ? 'none' : '';
      el('tgrow').style.display = tgActive ? '' : 'none';
      if (tgActive) {
        const tgLabel = data.talkgroup_name && data.talkgroup_name !== String(data.talkgroup)
          ? `TG ${data.talkgroup} - ${data.talkgroup_name}`
          : `TG ${data.talkgroup}`;
        el('tgtext').textContent = tgLabel;
      } else {
        el('freq').textContent = (freq.value !== undefined && freq.value !== null && freq.value !== '') ? freq.value : '--.---';
        el('unit').textContent = freq.unit || 'MHz';
        if (freq.band) {
          el('bandtag').textContent = freq.band;
          el('bandtag').style.display = '';
        } else {
          el('bandtag').style.display = 'none';
        }
      }

      el('opmode').textContent = data.activity || data.operating_mode || '';
      el('msg').textContent = data.custom_message || '';
      el('updated').textContent = data.last_updated ? timeAgo(data.last_updated) : '--';

      const widget = el('widget');
      widget.setAttribute('data-state', state);
      el('statusword').textContent = STATE_LABELS[state] || state.toUpperCase();
    } catch (err) {
      el('widget').innerHTML = '<div class="error-state">Signal lost — status unavailable</div>';
    }
  }

  refresh();
  setInterval(refresh, Math.max(15, refreshSec) * 1000);
})();
</script>
</body>
</html>
