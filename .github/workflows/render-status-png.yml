name: Render status.png

on:
  push:
    paths:
      - 'status.json'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow and fonts
        run: |
          pip install Pillow
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core

      - name: Render status.png
        run: python render_status_png.py status.json status.png

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.png
          if ! git diff --staged --quiet; then
            git commit -m "Auto-render status.png [skip ci]"
            git push
          else
            echo "status.png unchanged, nothing to commit"
          fi
