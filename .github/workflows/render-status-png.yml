name: Render status.png

on:
  push:
    paths:
      - 'status.json'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Install Pillow and fonts
        run: |
          pip install Pillow
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core

      - name: Render status.png
        run: python render_status_png.py status.json status.png

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.png
          if git diff --staged --quiet; then
            echo "status.png unchanged, nothing to commit"
            exit 0
          fi
          git commit -m "Auto-render status.png [skip ci]"

          # status.json (and this workflow) can fire again before this run
          # finishes, so main may have moved since checkout -- retry with a
          # rebase instead of failing outright on a non-fast-forward push.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5), pulling and retrying..."
            git pull --rebase origin "${{ github.ref_name }}"
          done
          echo "Failed to push after 5 attempts"
          exit 1
