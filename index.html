<!-- HamStatus Card Wrapper -->
<div id="hamstatus-card" class="hs-card">
  <div class="hs-header">
    <span class="hs-title">HamStatus</span>
    <span id="hs-indicator" class="hs-indicator offline">Offline</span>
  </div>
  <div class="hs-body">
    <p><strong>Callsign:</strong> <span id="hs-callsign">--</span></p>
    <p><strong>Status:</strong> <span id="hs-activity">--</span></p>
    <p><strong>Mode:</strong> <span id="hs-type">--</span></p>
    <p id="hs-freq-row"><strong>Frequency:</strong> <span id="hs-freq">--</span></p>
    <p id="hs-tg-row" style="display:none;"><strong>Talkgroup:</strong> <span id="hs-tg">--</span></p>
    <p><strong>Location:</strong> <span id="hs-loc">--</span></p>
    <p class="hs-msg"><em>"<span id="hs-message">No status set.</span>"</em></p>
  </div>
  <div class="hs-footer">
    Last updated: <span id="hs-time">--</span>
  </div>
  <div class="hs-aprs" id="hs-aprs-section" style="display:none;">
    <div class="hs-aprs-row">
      <span><span class="hs-aprs-dot" id="hs-aprs-dot"></span>APRS</span>
      <span id="hs-aprs-ago">--</span>
    </div>
    <div class="hs-aprs-comment" id="hs-aprs-comment"></div>
    <div class="hs-aprs-msg" id="hs-aprs-msg"></div>
  </div>
</div>

<!-- Simple Styling to make it look sharp -->
<style>
  .hs-card {
    font-family: system-ui, -apple-system, sans-serif;
    border: 1px solid #ccc;
    border-radius: 8px;
    max-width: 320px;
    background: #1e1e1e;
    color: #fff;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    overflow: hidden;
  }
  .hs-header {
    background: #2d2d2d;
    padding: 10px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #3c3c3c;
  }
  .hs-title { font-weight: bold; }
  .hs-indicator {
    font-size: 0.8rem;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: bold;
  }
  .hs-indicator.active { background: #2ecc71; color: #fff; }
  .hs-indicator.monitoring { background: #f0ad4e; color: #1e1e1e; }
  .hs-indicator.offline { background: #e74c3c; color: #fff; }
  .hs-body { padding: 15px; font-size: 0.95rem; }
  .hs-body p { margin: 8px 0; }
  .hs-msg { color: #aaa; margin-top: 12px; }
  .hs-footer {
    background: #181818;
    padding: 8px 15px;
    font-size: 0.75rem;
    color: #777;
    border-top: 1px solid #282828;
  }
  .hs-aprs {
    padding: 10px 15px 12px;
    font-size: 0.8rem;
    border-top: 1px solid #282828;
  }
  .hs-aprs-row { display: flex; justify-content: space-between; color: #aaa; }
  .hs-aprs-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #555; margin-right: 6px;
  }
  .hs-aprs-dot.active { background: #2ecc71; }
  .hs-aprs-comment { color: #888; font-style: italic; margin-top: 3px; }
  .hs-aprs-msg { color: #777; font-size: 0.75rem; margin-top: 3px; }
</style>

<!-- The JavaScript Magic -->
<script>
  const HS_STATE_LABELS = { on_air: 'On Air', monitoring: 'Monitoring', off_air: 'Offline' };

  function hsTimeAgo(iso) {
    const mins = Math.round((Date.now() - new Date(iso).getTime()) / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.round(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.round(hrs / 24) + 'd ago';
  }

  async function fetchHamStatus() {
    try {
      // Fetches the JSON file from the root of your website
      const response = await fetch('./status.json?t=' + Date.now(), { cache: 'no-store' });
      if (!response.ok) throw new Error('Network response was not ok');
      const data = await response.json();

      // Supports both the v1.0 schema (frequency as an object, state as an enum)
      // and the older flat schema, so this keeps working even against a
      // status.json that hasn't been migrated yet.
      const freq = (data.frequency && typeof data.frequency === 'object')
        ? data.frequency
        : { value: data.frequency, unit: 'MHz' };
      const state = data.state || (data.is_active ? 'on_air' : 'off_air');

      // Update the HTML elements with our JSON data
      document.getElementById('hs-callsign').textContent = data.callsign;
      document.getElementById('hs-activity').textContent = data.activity || data.operating_mode || '--';
      document.getElementById('hs-type').textContent = data.mode;
      document.getElementById('hs-loc').textContent = `${data.location.description} (${data.location.grid_square})`;
      document.getElementById('hs-message').textContent = data.custom_message;

      // DMR sessions with an active talkgroup show "TG <id> - <name>" in place
      // of the Frequency row; everything else (analog modes, local repeater
      // links) shows the actual frequency as usual.
      const freqRow = document.getElementById('hs-freq-row');
      const tgRow = document.getElementById('hs-tg-row');
      if (data.mode === 'DMR' && data.talkgroup) {
        freqRow.style.display = 'none';
        tgRow.style.display = '';
        const tgLabel = data.talkgroup_name && data.talkgroup_name !== String(data.talkgroup)
          ? `TG ${data.talkgroup} - ${data.talkgroup_name}`
          : `TG ${data.talkgroup}`;
        document.getElementById('hs-tg').textContent = tgLabel;
      } else {
        freqRow.style.display = '';
        tgRow.style.display = 'none';
        document.getElementById('hs-freq').textContent = `${freq.value ?? '--'} ${freq.unit || 'MHz'}`;
      }

      // Format the ISO timestamp to a readable local time
      const updateTime = new Date(data.last_updated);
      document.getElementById('hs-time').textContent = updateTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

      // Toggle status indicator (on_air / monitoring / off_air)
      const indicator = document.getElementById('hs-indicator');
      indicator.textContent = HS_STATE_LABELS[state] || state;
      indicator.className = 'hs-indicator ' + (state === 'on_air' ? 'active' : state === 'monitoring' ? 'monitoring' : 'offline');

      // APRS section is purely additive -- only shown at all once the aprs
      // service has actually reported in at least once.
      const APRS_STALE_MINUTES = 60;
      const aprsSection = document.getElementById('hs-aprs-section');
      if (data.aprs && data.aprs.last_beacon) {
        aprsSection.style.display = '';
        const ageMs = Date.now() - new Date(data.aprs.last_beacon).getTime();
        document.getElementById('hs-aprs-dot').classList.toggle('active', ageMs < APRS_STALE_MINUTES * 60000);
        document.getElementById('hs-aprs-ago').textContent = hsTimeAgo(data.aprs.last_beacon);
        const commentEl = document.getElementById('hs-aprs-comment');
        commentEl.textContent = data.aprs.comment || '';
        commentEl.style.display = data.aprs.comment ? '' : 'none';
        const msgEl = document.getElementById('hs-aprs-msg');
        if (data.aprs.last_message && data.aprs.last_message.text) {
          msgEl.textContent = `\u2192 ${data.aprs.last_message.to}: ${data.aprs.last_message.text}`;
          msgEl.style.display = '';
        } else {
          msgEl.style.display = 'none';
        }
      } else {
        aprsSection.style.display = 'none';
      }
    } catch (error) {
      console.error('Error fetching HamStatus:', error);
    }
  }

  // Run the function when the page loads
  fetchHamStatus();
</script>
